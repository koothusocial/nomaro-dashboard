<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOMARO: GTM Strategy & Production Dashboard</title>
    
    <!-- External Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500;1,700&display=swap" rel="stylesheet">

    <style>
        :root {
            --nomaro-orange: #f15e27;
            --nomaro-black: #0f0f10;
            --nomaro-surface: #1a1a1c;
            --nomaro-border: #3f3f46;
            --nomaro-text: #fafafa;
            --nomaro-muted: #a1a1aa;
        }

        html, body {
            background-color: var(--nomaro-black);
            color: var(--nomaro-text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-font-smoothing: antialiased;
            margin: 0;
            padding: 0;
            height: 100%;
        }

        .font-primary { font-family: 'Plus Jakarta Sans', sans-serif; }
        .font-tech { font-family: 'JetBrains Mono', monospace; }
        .font-editorial { font-family: 'Instrument Serif', serif; }

        .chart-container {
            position: relative;
            width: 100%;
            height: 250px;
        }
        @media (min-width: 768px) {
            .chart-container { height: 300px; }
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--nomaro-black); }
        ::-webkit-scrollbar-thumb { background: #5e5e63; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--nomaro-orange); }

        .fade-in { animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .nav-btn {
            border-left: 3px solid transparent;
            transition: all 0.2s;
        }
        .nav-btn.active {
            background-color: var(--nomaro-surface);
            border-left-color: var(--nomaro-orange);
            color: var(--nomaro-text);
            font-weight: 700;
        }
        
        .interactive-btn { transition: all 0.2s; }
        .interactive-btn.active {
            background-color: var(--nomaro-orange);
            color: var(--nomaro-text);
            border-color: var(--nomaro-orange);
        }

        /* Editable inputs */
        [contenteditable="true"] {
            outline: none;
            border-radius: 4px;
            transition: all 0.2s ease;
            min-width: 20px;
            border: 1px solid transparent;
        }
        [contenteditable="true"]:hover {
            background-color: rgba(241, 94, 39, 0.05);
            border-color: rgba(241, 94, 39, 0.2);
            cursor: text;
        }
        [contenteditable="true"]:focus {
            background-color: rgba(241, 94, 39, 0.1);
            border-bottom-color: var(--nomaro-orange);
            border-radius: 4px 4px 0 0;
        }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .drag-over { border: 2px dashed var(--nomaro-orange) !important; opacity: 0.5; }

        /* Print Styles for Native PDF Export */
        @media print {
            @page { margin: 10mm; size: auto; }
            html, body {
                height: auto !important;
                overflow: visible !important;
                background-color: #0f0f10 !important;
                color: #fafafa !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
            nav, .no-print, #addContentModal, #addMonthModal, #loadModal, #toast {
                display: none !important;
            }
            #main-content {
                height: auto !important;
                overflow: visible !important;
                padding: 0 !important;
            }
            .print-section {
                page-break-after: always;
                break-after: page;
                width: 100%;
                padding-top: 1rem;
                padding-bottom: 2rem;
            }
            .print-section:last-child {
                page-break-after: auto;
                break-after: auto;
            }
            .fade-in { animation: none !important; opacity: 1 !important; transform: none !important; }
            .break-inside-avoid { break-inside: avoid; page-break-inside: avoid; }
        }
    </style>
</head>
<body id="app-body" class="flex flex-col md:flex-row h-screen overflow-hidden">

    <!-- Sidebar Navigation -->
    <nav class="w-full md:w-72 bg-[#0f0f10] border-b md:border-b-0 md:border-r border-[#3f3f46] flex flex-col shrink-0 z-50">
        <div class="p-6 md:p-8 border-b border-[#3f3f46] bg-[#0f0f10] relative z-10 shrink-0">
            <div class="flex items-start cursor-pointer group" onclick="navigate('exec')">
                <h1 class="text-4xl font-bold tracking-tight leading-none text-[#fafafa] font-primary group-hover:opacity-80 transition-opacity">
                    nomaro
                </h1>
            </div>
            <p class="text-[10px] font-bold text-[#5e5e63] tracking-widest uppercase mt-4 font-tech">Client Strategy Portal</p>
        </div>
        
        <div class="flex-grow overflow-x-auto md:overflow-y-auto py-2 md:py-4 flex flex-row md:flex-col relative z-10 hide-scrollbar" id="nav-container">
            <!-- Nav injected via JS -->
        </div>

        <div class="flex flex-col p-6 md:p-8 border-t border-[#3f3f46] bg-[#0f0f10] shrink-0 gap-3">
            <p class="text-[10px] font-tech text-[#5e5e63] uppercase tracking-widest mb-1">State Management</p>
            <div class="flex gap-2">
                <button onclick="saveVersion()" class="flex-1 bg-[#1a1a1c] hover:bg-[#3f3f46] border border-[#3f3f46] text-[#fafafa] font-tech text-[10px] uppercase tracking-widest py-2 rounded transition-colors" title="Save locally to browser cache">Save Cache</button>
                <button onclick="openLoadModal()" class="flex-1 bg-[#1a1a1c] hover:bg-[#3f3f46] border border-[#3f3f46] text-[#fafafa] font-tech text-[10px] uppercase tracking-widest py-2 rounded transition-colors" title="Load from browser cache">Load Cache</button>
            </div>
            <div class="flex gap-2 mt-1">
                <button onclick="exportData()" class="flex-1 bg-[#1a1a1c] hover:bg-[#3f3f46] border border-[#3f3f46] text-[#fafafa] font-tech text-[10px] uppercase tracking-widest py-2 rounded transition-colors" title="Download JSON file">Download</button>
                <button onclick="triggerImport()" class="flex-1 bg-[#1a1a1c] hover:bg-[#3f3f46] border border-[#3f3f46] text-[#fafafa] font-tech text-[10px] uppercase tracking-widest py-2 rounded transition-colors" title="Upload JSON file">Upload</button>
            </div>
            <button onclick="exportPDF()" class="w-full bg-[#f15e27] hover:bg-[#d44c1a] text-white font-tech text-[10px] uppercase tracking-widest py-2.5 rounded transition-colors mt-2 shadow-lg">
                Generate Master PDF
            </button>
            
            <div class="flex flex-col gap-1 mt-4 border-t border-[#3f3f46] pt-4 text-xs text-[#5e5e63] font-tech">
                <span class="text-[#f15e27] font-bold tracking-widest uppercase text-[10px]">Confidential</span>
                <span contenteditable="true" onblur="updateDB('exec.docTitle', this)" id="docTitle">MADE BY KOOTHU</span>
                <span contenteditable="true" onblur="updateDB('exec.docVersion', this)">v1.0.0</span>
                <button onclick="clearCache()" class="text-left mt-2 hover:text-red-500 transition-colors uppercase tracking-widest text-[10px]">Clear Cache</button>
            </div>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main class="flex-grow overflow-y-auto bg-[#0f0f10] p-4 sm:p-8 md:p-12 relative w-full min-w-0" id="main-content">
        <!-- Views injected via JS -->
    </main>

    <!-- Hidden Input for File Import -->
    <input type="file" id="importFile" accept=".json" onchange="importData(event)" class="hidden">

    <!-- Load Version Modal -->
    <div id="loadModal" class="fixed inset-0 bg-black bg-opacity-80 z-[100] hidden flex items-center justify-center p-4 fade-in no-print">
        <div class="bg-[#1a1a1c] border border-[#3f3f46] rounded-xl p-6 md:p-8 max-w-sm w-full text-[#fafafa] relative shadow-2xl">
            <button onclick="closeLoadModal()" class="absolute top-5 right-5 text-[#5e5e63] hover:text-[#fafafa] hover:bg-[#f15e27] hover:border-[#f15e27] transition-colors w-8 h-8 flex items-center justify-center rounded-full bg-[#0f0f10] border border-[#3f3f46] text-xl leading-none pb-1">&times;</button>
            <h3 class="text-2xl font-editorial italic mb-2">Load Strategy Version</h3>
            <p class="text-[10px] font-tech text-[#a1a1aa] mb-6 uppercase tracking-widest border-b border-[#3f3f46] pb-4">Select a saved browser cache</p>
            
            <div id="loadVersionList" class="flex flex-col gap-2 max-h-[40vh] overflow-y-auto pr-2">
                <!-- Versions injected here -->
            </div>
        </div>
    </div>

    <!-- Add Month Modal -->
    <div id="addMonthModal" class="fixed inset-0 bg-black bg-opacity-80 z-[100] hidden flex items-center justify-center p-4 fade-in no-print">
        <div class="bg-[#1a1a1c] border border-[#3f3f46] rounded-xl p-6 md:p-8 max-w-sm w-full text-[#fafafa] relative shadow-2xl">
            <button onclick="closeAddMonthModal()" class="absolute top-5 right-5 text-[#5e5e63] hover:text-[#fafafa] hover:bg-[#f15e27] hover:border-[#f15e27] transition-colors w-8 h-8 flex items-center justify-center rounded-full bg-[#0f0f10] border border-[#3f3f46] text-xl leading-none pb-1">&times;</button>
            <h3 class="text-2xl font-editorial italic mb-2">Add Timeline Month</h3>
            <p class="text-[10px] font-tech text-[#a1a1aa] mb-6 uppercase tracking-widest border-b border-[#3f3f46] pb-4">Expand the roadmap</p>
            
            <div class="flex flex-col gap-4">
                <div>
                    <label class="font-tech text-[10px] text-[#f15e27] uppercase tracking-widest block mb-1">Month & Year *</label>
                    <input type="text" id="newMonthName" placeholder="e.g. November 2026" class="w-full bg-[#0f0f10] border border-[#3f3f46] rounded-md px-4 py-3 text-sm focus:outline-none focus:border-[#f15e27] text-[#fafafa]">
                </div>
                <div class="text-red-500 text-xs hidden" id="addMonthError">Month name is required.</div>
                <button onclick="saveNewMonth()" class="mt-4 bg-[#f15e27] hover:bg-[#d44c1a] text-white font-tech text-[10px] uppercase tracking-widest py-3.5 rounded-md transition-colors">
                    Add Month
                </button>
            </div>
        </div>
    </div>

    <!-- Add Content Modal -->
    <div id="addContentModal" class="fixed inset-0 bg-black bg-opacity-80 z-[100] hidden flex items-center justify-center p-4 fade-in no-print">
        <div class="bg-[#1a1a1c] border border-[#3f3f46] rounded-xl p-6 md:p-8 max-w-lg w-full text-[#fafafa] relative shadow-2xl max-h-[90vh] overflow-y-auto">
            <button onclick="closeAddContentModal()" class="absolute top-5 right-5 text-[#5e5e63] hover:text-[#fafafa] hover:bg-[#f15e27] hover:border-[#f15e27] transition-colors w-8 h-8 flex items-center justify-center rounded-full bg-[#0f0f10] border border-[#3f3f46] text-xl leading-none pb-1">&times;</button>
            <h3 class="text-2xl font-editorial italic mb-2">Schedule Deliverable</h3>
            <p class="text-[10px] font-tech text-[#a1a1aa] mb-6 uppercase tracking-widest border-b border-[#3f3f46] pb-4">Add to Daily Calendar</p>
            
            <div class="flex flex-col gap-4">
                <div>
                    <label class="font-tech text-[10px] text-[#f15e27] uppercase tracking-widest block mb-1">Date *</label>
                    <input type="text" id="newDate" placeholder="e.g. May 12" class="w-full bg-[#0f0f10] border border-[#3f3f46] rounded-md px-4 py-3 text-sm focus:outline-none focus:border-[#f15e27] text-[#fafafa]">
                </div>
                <div>
                    <label class="font-tech text-[10px] text-[#f15e27] uppercase tracking-widest block mb-1">Time</label>
                    <input type="text" id="newTime" placeholder="e.g. 10:00 AM IST" class="w-full bg-[#0f0f10] border border-[#3f3f46] rounded-md px-4 py-3 text-sm focus:outline-none focus:border-[#f15e27] text-[#fafafa]">
                </div>
                <div>
                    <label class="font-tech text-[10px] text-[#f15e27] uppercase tracking-widest block mb-1">Content Title / Theme *</label>
                    <input type="text" id="newTitle" placeholder="e.g. Feature Highlight" class="w-full bg-[#0f0f10] border border-[#3f3f46] rounded-md px-4 py-3 text-sm focus:outline-none focus:border-[#f15e27] text-[#fafafa]">
                </div>
                <div>
                    <label class="font-tech text-[10px] text-[#5e5e63] uppercase tracking-widest block mb-1">Month Category</label>
                    <select id="newMonthSelect" class="w-full bg-[#0f0f10] border border-[#3f3f46] rounded-md px-4 py-3 text-sm focus:outline-none focus:border-[#f15e27] text-[#fafafa]">
                        <!-- Injected dynamically -->
                    </select>
                </div>
                <div class="text-red-500 text-xs hidden" id="addError">Date and Content Title are mandatory.</div>
                <button onclick="saveNewContent()" class="mt-4 bg-[#f15e27] hover:bg-[#d44c1a] text-white font-tech text-[10px] uppercase tracking-widest py-3.5 rounded-md transition-colors">
                    Create Content Card
                </button>
            </div>
        </div>
    </div>

    <!-- Notification Toast -->
    <div id="toast" class="fixed bottom-6 right-6 bg-[#fafafa] text-[#0f0f10] px-6 py-3 rounded-md shadow-2xl font-tech text-xs tracking-widest uppercase transition-opacity duration-300 opacity-0 pointer-events-none z-[200]">
        Notification
    </div>

    <script>
        // --- 1. UTILITIES & GLOBALLY EDITABLE DATA BINDING ---
        function parseFullDigits(str) {
            let numStr = str.toString().replace(/[^0-9]/g, '');
            return parseInt(numStr, 10) || 0;
        }

        function formatINR(num) {
            return Number(num).toLocaleString('en-IN');
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.innerText = message;
            toast.classList.remove('opacity-0');
            setTimeout(() => {
                toast.classList.add('opacity-0');
            }, 3000);
        }

        window.updateDB = function(path, element) {
            const value = element.innerText.trim();
            const parts = path.split('.');
            let obj = window.db;
            for (let i = 0; i < parts.length - 1; i++) {
                obj = obj[parts[i]];
            }
            obj[parts[parts.length - 1]] = value;
            autoSave();
        };

        window.updateBudget = function(mIndex, pIndex, el) {
            let val = parseFullDigits(el.innerText);
            window.db.months[mIndex].phases[pIndex].budget = val;
            autoSave();
            navigate(state.view); 
        };

        window.updateProdBudget = function(i, el) {
            let val = parseFullDigits(el.innerText);
            window.db.production[i].budget = val;
            autoSave();
            navigate(state.view);
        }

        // --- 1B. FILE SYSTEM SAVE / LOAD LOGIC ---
        function autoSave() {
            localStorage.setItem('nomaro_autosave', JSON.stringify(window.db));
        }

        window.clearCache = function() {
            if(confirm("Are you sure you want to clear all data and reset to defaults?")) {
                localStorage.removeItem('nomaro_autosave');
                localStorage.removeItem('nomaro_versions');
                window.db = JSON.parse(JSON.stringify(defaultDb)); // Deep clone to reset
                autoSave();
                navigate(state.view);
                const dt = document.getElementById('docTitle');
                if(dt) dt.innerText = window.db.exec.docTitle;
                showToast('Cache cleared. Reset to default.');
            }
        };

        window.saveVersion = function() {
            const vName = prompt("Enter a name for this strategy version:");
            if(!vName) return;
            let versions = JSON.parse(localStorage.getItem('nomaro_versions') || '{}');
            versions[vName] = window.db;
            localStorage.setItem('nomaro_versions', JSON.stringify(versions));
            showToast(`Version '${vName}' saved locally`);
        }

        window.openLoadModal = function() {
            let versions = JSON.parse(localStorage.getItem('nomaro_versions') || '{}');
            const keys = Object.keys(versions);
            const list = document.getElementById('loadVersionList');
            
            if(keys.length === 0) {
                list.innerHTML = '<p class="text-sm font-primary text-[#5e5e63] italic">No saved custom versions found.</p>';
            } else {
                list.innerHTML = keys.map(k => `
                    <div class="flex justify-between items-center p-4 bg-[#0f0f10] border border-[#3f3f46] rounded-lg mb-3 last:mb-0">
                        <span class="text-sm font-primary font-bold text-[#fafafa] break-words whitespace-normal min-w-0 flex-grow pr-4">${k}</span>
                        <div class="flex gap-3 shrink-0">
                            <button onclick="loadSpecificVersion('${k}')" class="text-[10px] font-tech uppercase tracking-widest text-[#f15e27] hover:text-[#fafafa] transition-colors">Load</button>
                            <button onclick="deleteSpecificVersion('${k}')" class="text-[10px] font-tech uppercase tracking-widest text-[#5e5e63] hover:text-red-500 transition-colors">Del</button>
                        </div>
                    </div>
                `).join('');
            }
            document.getElementById('loadModal').classList.remove('hidden');
        }

        window.closeLoadModal = function() {
            document.getElementById('loadModal').classList.add('hidden');
        }

        window.loadSpecificVersion = function(k) {
            let versions = JSON.parse(localStorage.getItem('nomaro_versions') || '{}');
            if(versions[k]) {
                window.db = migrateData(versions[k]);
                autoSave();
                navigate(state.view);
                closeLoadModal();
                showToast(`Loaded version: ${k}`);
                const dt = document.getElementById('docTitle');
                if(dt) dt.innerText = window.db.exec.docTitle || "MADE BY KOOTHU";
            }
        }

        window.deleteSpecificVersion = function(k) {
            let versions = JSON.parse(localStorage.getItem('nomaro_versions') || '{}');
            delete versions[k];
            localStorage.setItem('nomaro_versions', JSON.stringify(versions));
            openLoadModal(); 
        }

        // External JSON file Export/Import for GitHub hosting
        window.exportData = function() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(window.db, null, 2));
            const dlAnchorElem = document.createElement('a');
            dlAnchorElem.setAttribute("href", dataStr);
            dlAnchorElem.setAttribute("download", "nomaro_strategy_state.json");
            document.body.appendChild(dlAnchorElem);
            dlAnchorElem.click();
            dlAnchorElem.remove();
            showToast('JSON file downloaded to PC');
        };

        window.triggerImport = function() {
            document.getElementById('importFile').click();
        };

        window.importData = function(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const importedDb = JSON.parse(e.target.result);
                    if (importedDb && importedDb.exec && importedDb.months) {
                        window.db = migrateData(importedDb);
                        autoSave();
                        navigate(state.view);
                        const dt = document.getElementById('docTitle');
                        if(dt) dt.innerText = window.db.exec.docTitle || "MADE BY KOOTHU";
                        showToast('JSON strategy imported successfully!');
                    } else {
                        showToast('Error: Invalid JSON format');
                    }
                } catch (err) {
                    showToast('Error parsing JSON file');
                }
            };
            reader.readAsText(file);
            event.target.value = ''; 
        };

        // --- MIGRATION UTILITY ---
        // Converts old "35" or "18.5" Lakh budgets into pure digits (3500000)
        function migrateData(dataObj) {
            if(dataObj.months) {
                dataObj.months.forEach(m => m.phases.forEach(p => {
                    if (typeof p.budget === 'string' && parseFloat(p.budget) < 1000) {
                        p.budget = parseFloat(p.budget) * 100000;
                    }
                }));
            }
            if(dataObj.production) {
                dataObj.production.forEach(p => {
                    if (typeof p.budget === 'string' && parseFloat(p.budget) < 1000) {
                        p.budget = parseFloat(p.budget) * 100000;
                    }
                });
            }
            return dataObj;
        }

        // Native Direct Print PDF Export
        window.exportPDF = function() {
            const currentView = state.view;
            showToast('Preparing PDF layout for printing...');
            
            Chart.defaults.animation = false;
            document.getElementById('app-body').classList.remove('h-screen', 'overflow-hidden');

            const main = document.getElementById('main-content');
            main.innerHTML = '';
            
            const v1 = document.createElement('div'); v1.className = 'print-section';
            const v2 = document.createElement('div'); v2.className = 'print-section';
            const v3 = document.createElement('div'); v3.className = 'print-section';
            const v4 = document.createElement('div'); v4.className = 'print-section';
            
            main.appendChild(v1);
            main.appendChild(v2);
            main.appendChild(v3);
            main.appendChild(v4);

            const originalMonthFilter = state.monthFilter;
            const originalMonthId = state.monthId;
            state.monthFilter = 'All';

            renderExec(v1);
            
            v2.innerHTML = '<h2 class="text-5xl font-editorial italic mb-8 text-[#fafafa] w-full border-b border-[#3f3f46] pb-4">Master Strategic Roadmap</h2>';
            window.db.months.filter(m => m.active).forEach(m => {
                const mDiv = document.createElement('div');
                mDiv.className = 'mb-12 break-inside-avoid';
                v2.appendChild(mDiv);
                
                state.monthId = m.id;
                renderRoadmap(mDiv);
                
                const headersToHide = mDiv.querySelectorAll('h2, .py-2, .bg-\\[\\#1a1a1c\\].flex.flex-wrap, .no-print');
                headersToHide.forEach(h => h.style.display = 'none');
                
                const monthHeader = document.createElement('h3');
                monthHeader.className = 'text-3xl font-tech text-[#f15e27] mb-6 uppercase tracking-widest';
                monthHeader.innerText = m.name;
                mDiv.insertBefore(monthHeader, mDiv.firstChild);
            });

            renderProduction(v3);
            renderContent(v4);
            
            // Hide all remaining no-print elements
            main.querySelectorAll('.no-print, button:not(.nav-btn)').forEach(el => {
                el.style.display = 'none';
            });
            
            state.monthFilter = originalMonthFilter;
            state.monthId = originalMonthId;

            setTimeout(() => {
                window.print();
                
                document.getElementById('app-body').classList.add('h-screen', 'overflow-hidden');
                Chart.defaults.animation = true;
                navigate(currentView); 
            }, 1000);
        }

        // --- 2. DATA STORE ---
        const platformDefaults = () => ({ facebook: false, instagram: false, tiktok: false, youtube: false, email: false, website: false, offline: false });

        const defaultDb = {
            exec: {
                timeline: "May 15 (Shopify) → July 1 (Amazon)",
                summary: "This dashboard outlines the Go-To-Market strategy, balancing aesthetic appeal with highly engineered product delivery. Use the breakdown below to review or modify capital allocations instantly.",
                docTitle: "MADE BY KOOTHU",
                docVersion: "v1.0.0"
            },
            months: [
                {
                    id: 1, name: "May 2026", active: true,
                    phases: [
                        {
                            id: 101, title: "Digital Flagship Soft Launch", budget: 0,
                            audience: "Waitlist Subscribers, Early Adopters",
                            kpis: ["Shopify Store Live", "10,000 Early Site Visitors"],
                            actions: [
                                { tag: "Shopify", text: "Store design finalized. Password drops to community, triggering the D2C flagship launch in mid-May." },
                                { tag: "Social", text: "Launch IG & TikTok. Tease the Shopify drop and deploy the first emotional campaign visuals to build the base audience." }

                    </div>
                    
                    <div class="flex flex-col sm:flex-row gap-3 mb-8 w-full flex-wrap no-print">${tabs}</div>
                    
                    ${activeMonth && activeMonth.active ? `
                    <div class="w-full mb-6 flex justify-end no-print">
                        <button onclick="window.addPhase(${mIndex})" class="bg-[#fafafa] text-[#0f0f10] hover:bg-[#d1d5db] font-tech text-[10px] uppercase tracking-widest px-6 py-3 rounded-full transition-colors whitespace-nowrap shadow-lg">
                            + Add Phase to ${activeMonth.name}
                        </button>
                    </div>` : ''}

                    ${phasesHtml}
                </div>
            `;
        }

        window.updateP = (id) => { state.monthId = id; navigate(state.view); };

        // View 3: Media Production
        window.addProdProject = function() {
            window.db.production.push({ id: Date.now(), cat: "New Category", title: "New Project", desc: "Add details here.", date: "TBD", budget: "0" });
            autoSave();
            navigate(state.view);
        }

        window.deleteProdProject = function(index) {
            window.db.production.splice(index, 1);
            autoSave();
            navigate(state.view);
        }

        function renderProduction(container) {
            const projectsHtml = window.db.production.map((p, i) => `
                <div class="bg-[#1a1a1c] border border-[#3f3f46] rounded-xl p-6 md:p-8 hover:border-[#f15e27] transition-colors flex flex-col h-full w-full min-w-0 relative group break-inside-avoid">
                    <button onclick="window.deleteProdProject(${i})" class="absolute top-4 right-4 text-[#5e5e63] hover:text-red-500 md:opacity-0 group-hover:opacity-100 transition-opacity text-xl font-bold leading-none w-8 h-8 rounded-full flex justify-center items-center pb-1 z-10 no-print">&times;</button>
                    
                    <span class="font-tech text-[10px] text-[#f15e27] uppercase tracking-widest block mb-2 border border-transparent focus:border-b-[#f15e27] w-fit" contenteditable="true" onblur="updateDB('production.${i}.cat', this)">${p.cat}</span>
                    <h4 class="font-editorial italic text-3xl text-[#fafafa] mb-4 block w-full break-words whitespace-normal min-w-0 pr-6 border border-transparent focus:border-b-[#f15e27]" contenteditable="true" onblur="updateDB('production.${i}.title', this)">${p.title}</h4>
                    
                    <div class="flex items-center gap-2 mb-4 w-fit flex-wrap">
                        <span class="font-tech text-[10px] text-[#5e5e63] uppercase tracking-widest">Timeline:</span>
                        <span class="font-tech text-[10px] text-[#fafafa] border border-transparent focus:border-b-[#f15e27]" contenteditable="true" onblur="updateDB('production.${i}.date', this)">${p.date}</span>
                    </div>

                    <p class="text-sm font-primary text-[#a1a1aa] leading-relaxed flex-grow block w-full break-words whitespace-normal min-w-0 mb-6 border border-transparent focus:border-b-[#f15e27]" contenteditable="true" onblur="updateDB('production.${i}.desc', this)">${p.desc}</p>
                    
                    <div class="pt-5 border-t border-[#3f3f46] mt-auto w-full min-w-0 flex justify-between items-center">
                        <span class="font-tech text-[10px] uppercase tracking-widest text-[#5e5e63] block">Allocated Budget</span>
                        <p class="font-tech text-lg text-[#fafafa] flex items-center gap-1">
                            <span class="text-[10px] text-[#a1a1aa] font-normal">INR</span> 
                            <span class="border border-transparent focus:border-b-[#f15e27] min-w-[30px] text-right" contenteditable="true" onblur="updateProdBudget(${i}, this)">${formatINR(p.budget).replace('₹ ', '')}</span>
                        </p>
                    </div>
                </div>
            `).join('');

            container.innerHTML = `
                <div class="fade-in max-w-7xl mx-auto pb-12 w-full">
                    <div class="flex flex-col md:flex-row justify-between items-start md:items-end mb-10 w-full gap-6">
                        <div class="w-full md:w-2/3">
                            <h2 class="text-4xl font-editorial italic mb-4 text-[#fafafa] block w-full break-words whitespace-normal" contenteditable="true">Media Production</h2>
                            <p class="text-sm font-primary text-[#a1a1aa] leading-relaxed block w-full break-words whitespace-normal min-w-0" contenteditable="true">
                                This section manages the specific parameters for physical shoots, content capture, and post-production required to generate the omnichannel visual assets.
                            </p>
                        </div>
                        <button onclick="window.addProdProject()" class="bg-[#fafafa] text-[#0f0f10] hover:bg-[#d1d5db] font-tech text-[10px] uppercase tracking-widest px-6 py-3 rounded-full transition-colors whitespace-nowrap shadow-lg no-print">
                            + Add Project
                        </button>
                    </div>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6 w-full">
                        ${projectsHtml || `<p class="text-sm text-[#5e5e63] italic w-full col-span-full">No production projects defined.</p>`}
                    </div>
                </div>
            `;
        }

        // View 4: Deliverables Calendar
        window.openAddContentModal = function() {
            document.getElementById('newDate').value = '';
            document.getElementById('newTitle').value = '';
            
            const select = document.getElementById('newMonthSelect');
            select.innerHTML = window.db.months.filter(m => m.active).map(m => `<option value="${m.name}">${m.name}</option>`).join('');

            document.getElementById('addError').classList.add('hidden');
            document.getElementById('addContentModal').classList.remove('hidden');
        };

        window.closeAddContentModal = function() {
            document.getElementById('addContentModal').classList.add('hidden');
        };

        window.saveNewContent = function() {
            const date = document.getElementById('newDate').value.trim();
            const time = document.getElementById('newTime').value.trim() || "TBD";
            const title = document.getElementById('newTitle').value.trim();
            const month = document.getElementById('newMonthSelect').value;

            if(!date || !title) {
                document.getElementById('addError').classList.remove('hidden');
                return;
            }

            window.db.calendar.push({
                m: month, d: date, time: time, t: title,
                v: "Add visual directive here...", r: "Add strategic rationale here...", c: "Draft copy here...",
                plats: platformDefaults()
            });

            autoSave();
            closeAddContentModal();
            navigate(state.view);
        };

        window.deleteContent = function(index) {
            window.db.calendar.splice(index, 1);
            autoSave();
            navigate(state.view);
        };

        window.togglePlatform = function(itemIndex, plat) {
            window.db.calendar[itemIndex].plats[plat] = !window.db.calendar[itemIndex].plats[plat];
            autoSave();
            navigate(state.view);
        };

        window.dragStart = function(e, index) {
            draggedItemIndex = index;
            e.dataTransfer.effectAllowed = "move";
        };

        window.dragOver = function(e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = "move";
            e.currentTarget.classList.add('drag-over');
        };

        window.dragLeave = function(e) {
            e.currentTarget.classList.remove('drag-over');
        };

        window.drop = function(e, dropIndex) {
            e.preventDefault();
            e.currentTarget.classList.remove('drag-over');
            
            if(draggedItemIndex === null || draggedItemIndex === dropIndex) return;

            const item = window.db.calendar.splice(draggedItemIndex, 1)[0];
            window.db.calendar.splice(dropIndex, 0, item);
            draggedItemIndex = null;
            autoSave();
            navigate(state.view);
        };

        const platformKeys = ['facebook', 'instagram', 'tiktok', 'youtube', 'email', 'website', 'offline'];
        const platformLabels = { facebook: 'Facebook', instagram: 'Instagram', tiktok: 'TikTok', youtube: 'YouTube', email: 'Email', website: 'Website', offline: 'Offline' };

        function renderContent(container) {
            const uM = ['All', ...new Set(window.db.months.filter(m => m.active).map(m => m.name))];

            const mBtns = uM.map(m => `
                <button onclick="window.updateF('m', '${m}')" class="interactive-btn px-4 py-2.5 rounded-full font-tech text-[10px] uppercase tracking-widest border transition-colors shadow-sm ${state.monthFilter === m ? 'active' : 'bg-[#1a1a1c] text-[#a1a1aa] border-[#3f3f46] hover:border-[#f15e27]'}">${m}</button>
            `).join('');

            const fd = window.db.calendar.map((item, originalIndex) => ({ ...item, originalIndex })).filter(i => {
                return state.monthFilter === 'All' || i.m === state.monthFilter;
            });

            let gh = fd.map((i) => {
                const pBadges = platformKeys.map(pk => {
                    const active = i.plats[pk];
                    return `<button onclick="togglePlatform(${i.originalIndex}, '${pk}')" class="text-[9px] font-tech uppercase tracking-widest px-3 py-1.5 rounded transition-colors border ${active ? 'bg-[#f15e27] text-white border-[#f15e27] shadow-md' : 'bg-[#0f0f10] text-[#5e5e63] border-[#3f3f46] hover:border-[#a1a1aa] hover:text-[#fafafa]'}">${platformLabels[pk]}</button>`;
                }).join('');

                return `
                <div class="bg-[#1a1a1c] border border-[#3f3f46] rounded-xl p-6 md:p-8 flex flex-col hover:border-[#f15e27] transition-colors relative group break-inside-avoid shadow-sm w-full min-w-0"
                     draggable="true" 
                     ondragstart="dragStart(event, ${i.originalIndex})" 
                     ondragover="dragOver(event)" 
                     ondragleave="dragLeave(event)"
                     ondrop="drop(event, ${i.originalIndex})">
                    
                    <button onclick="deleteContent(${i.originalIndex})" class="absolute top-4 right-4 text-[#5e5e63] hover:text-red-500 md:opacity-0 group-hover:opacity-100 transition-opacity text-xl bg-[#0f0f10] rounded-full w-8 h-8 flex items-center justify-center border border-[#3f3f46] pb-1 no-print">&times;</button>
                    
                    <div class="flex flex-col gap-4 mb-6 border-b border-[#3f3f46] pb-6 w-full min-w-0">
                        <div class="flex flex-col w-full pr-6 min-w-0">
                            <div class="flex flex-row items-center gap-2 mb-4 w-full flex-wrap min-w-0">
                                <span class="font-tech text-[10px] text-[#fafafa] bg-[#0f0f10] border border-[#3f3f46] px-3 py-1.5 rounded whitespace-nowrap min-w-[30px]" contenteditable="true" onblur="updateDB('calendar.${i.originalIndex}.d', this)">${i.d}</span> 
                                <span class="text-[#f15e27] font-tech text-[10px]">&bull;</span> 
                                <span class="font-tech text-[10px] text-[#a1a1aa] bg-[#0f0f10] border border-[#3f3f46] px-3 py-1.5 rounded whitespace-nowrap min-w-[30px]" contenteditable="true" onblur="updateDB('calendar.${i.originalIndex}.time', this)">${i.time}</span>
                            </div>
                            <h4 class="font-editorial italic text-3xl text-[#fafafa] block w-full break-words whitespace-normal border border-transparent focus:border-b-[#f15e27]" contenteditable="true" onblur="updateDB('calendar.${i.originalIndex}.t', this)">${i.t}</h4>
                        </div>
                        
                        <div class="flex flex-wrap gap-2 mt-2 w-full">
                            ${pBadges}
                        </div>
                    </div>
                    
                    <div class="flex-grow flex flex-col gap-5 mb-6 w-full min-w-0">
                        <div class="w-full min-w-0">
                            <span class="font-tech text-[10px] text-[#f15e27] uppercase tracking-widest block mb-2" contenteditable="true">Visual Directive</span>
                            <p class="font-primary text-sm text-[#a1a1aa] leading-relaxed block w-full break-words whitespace-normal border border-transparent focus:border-b-[#f15e27] min-w-0" contenteditable="true" onblur="updateDB('calendar.${i.originalIndex}.v', this)">${i.v}</p>
                        </div>
                        <div class="w-full mt-2 min-w-0">
                            <span class="font-tech text-[10px] text-[#5e5e63] uppercase tracking-widest block mb-2" contenteditable="true">Strategic Purpose</span>
                            <p class="font-primary text-sm text-[#a1a1aa] leading-relaxed focus-within:outline-none block w-full break-words whitespace-normal border border-transparent focus:border-b-[#f15e27] min-w-0" contenteditable="true" onblur="updateDB('calendar.${i.originalIndex}.r', this)">${i.r}</p>
                        </div>
                    </div>
                    
                    <div class="w-full mt-auto border-t border-[#3f3f46] pt-6 min-w-0">
                        <span class="font-tech text-[10px] text-[#f15e27] uppercase tracking-widest block mb-2" contenteditable="true">Proposed Copy</span>
                        <p class="font-primary text-sm leading-relaxed text-[#fafafa] focus-within:outline-none block w-full break-words whitespace-normal border border-transparent focus:border-b-[#f15e27] pl-1 min-w-0" contenteditable="true" onblur="updateDB('calendar.${i.originalIndex}.c', this)">"${i.c}"</p>
                    </div>
                </div>
                `;
            }).join('');

            if(fd.length === 0) gh = `<div class="col-span-full text-center py-16 text-[#a1a1aa] bg-[#1a1a1c] rounded-xl border border-[#3f3f46] text-sm font-primary w-full">No deliverables scheduled for this timeframe.</div>`;

            container.innerHTML = `
                <div class="fade-in max-w-7xl mx-auto pb-12 w-full">
                    <div class="flex flex-col md:flex-row justify-between items-start md:items-end mb-8 gap-6 w-full">
                        <div class="w-full md:w-2/3">
                            <h2 class="text-4xl font-editorial italic mb-4 text-[#fafafa] block w-full break-words whitespace-normal" contenteditable="true">Deliverables Calendar</h2>
                            <p class="text-sm font-primary text-[#a1a1aa] leading-relaxed block w-full break-words whitespace-normal py-2" contenteditable="true">
                                Review and manipulate the daily content cadence. You can click to edit any text block securely, toggle active platforms using the tags, and drag-and-drop cards to reorder the schedule globally. 
                            </p>
                        </div>
                        <button onclick="openAddContentModal()" class="bg-[#fafafa] text-[#0f0f10] hover:bg-[#d1d5db] font-tech text-[10px] uppercase tracking-widest px-6 py-3.5 rounded-full transition-colors whitespace-nowrap shrink-0 shadow-lg border border-transparent focus:outline-none no-print">
                            + Add Deliverable
                        </button>
                    </div>
                    
                    <div class="flex flex-wrap items-center gap-3 bg-[#1a1a1c] p-5 rounded-xl border border-[#3f3f46] mb-8 w-full shadow-sm no-print">
                        <span class="font-tech text-[10px] uppercase tracking-widest text-[#5e5e63] mr-2">Timeframe Filter:</span>
                        ${mBtns}
                    </div>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6 items-start w-full">
                        ${gh}
                    </div>
                </div>
            `;
        }

        window.updateF = (type, val) => {
            if(type === 'm') state.monthFilter = val;
            navigate(state.view);
        };

    </script>
</body>
</html>
